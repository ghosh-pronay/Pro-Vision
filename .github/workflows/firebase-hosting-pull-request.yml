name: Deploy to Firebase Hosting on PR
on: pull_request
permissions:
  checks: write
  contents: read
  pull-requests: write
jobs:
  build_and_preview:
    if: ${{ github.event.pull_request.head.repo.full_name == github.repository }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - run: npm audit --audit-level=high || true
      - run: npm run lint && npm run typecheck && npm run test:coverage
      - run: npm run build
        env:
          VITE_FIREBASE_API_KEY: ${{ secrets.VITE_FIREBASE_API_KEY }}
          VITE_FIREBASE_AUTH_DOMAIN: pro-visions.firebaseapp.com
          VITE_FIREBASE_PROJECT_ID: pro-visions
          VITE_FIREBASE_STORAGE_BUCKET: pro-visions.firebasestorage.app
          VITE_FIREBASE_MESSAGING_SENDER_ID: "570621295453"
          VITE_FIREBASE_APP_ID: "1:570621295453:web:3e2c03807274d8d4e286b4"
          VITE_FIREBASE_MEASUREMENT_ID: G-C6FC4FJXWX
          VITE_FIREBASE_VAPID_KEY: ${{ secrets.VITE_FIREBASE_VAPID_KEY }}
      - uses: treosh/lighthouse-ci-action@af8bc4d8f9b8a2dbc2b8f4f5d8cf5359ffef56ea # v12.0.0
        with:
          urls: |
            http://localhost:4173/
          uploadArtifacts: true
          configPath: ./lighthouserc.json
      - uses: FirebaseExtended/action-hosting-deploy@v0
        with:
          repoToken: ${{ secrets.GITHUB_TOKEN }}
          firebaseServiceAccount: ${{ secrets.FIREBASE_SERVICE_ACCOUNT_PRO_VISIONS }}
          projectId: pro-visions
