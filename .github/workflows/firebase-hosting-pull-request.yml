name: Deploy to Firebase Hosting on PR
on: pull_request
permissions:
  checks: write
  contents: read
  pull-requests: write
jobs:
  build_and_preview:
    if: ${{ github.event.pull_request.head.repo.full_name == github.repository }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - run: npm run verify
      - run: npm run test:coverage
      - run: npm run build
        env:
          VITE_FIREBASE_API_KEY: ${{ secrets.VITE_FIREBASE_API_KEY }}
          VITE_FIREBASE_AUTH_DOMAIN: pro-visions.firebaseapp.com
          VITE_FIREBASE_PROJECT_ID: pro-visions
          VITE_FIREBASE_STORAGE_BUCKET: pro-visions.firebasestorage.app
          VITE_FIREBASE_MESSAGING_SENDER_ID: "570621295453"
          VITE_FIREBASE_APP_ID: "1:570621295453:web:3e2c03807274d8d4e286b4"
          VITE_FIREBASE_MEASUREMENT_ID: G-C6FC4FJXWX
          VITE_FIREBASE_VAPID_KEY: ${{ secrets.VITE_FIREBASE_VAPID_KEY }}
      - uses: FirebaseExtended/action-hosting-deploy@v0
        with:
          repoToken: ${{ secrets.GITHUB_TOKEN }}
          firebaseServiceAccount: ${{ secrets.FIREBASE_SERVICE_ACCOUNT_PRO_VISIONS }}
          projectId: pro-visions
