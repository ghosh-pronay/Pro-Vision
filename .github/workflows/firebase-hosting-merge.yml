name: Deploy to Firebase Hosting on merge
on:
  push:
    branches:
      - main
jobs:
  build_and_deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - run: npm run build
        env:
          VITE_FIREBASE_API_KEY: ${{ secrets.VITE_FIREBASE_API_KEY }}
          VITE_FIREBASE_AUTH_DOMAIN: pro-visions.firebaseapp.com
          VITE_FIREBASE_PROJECT_ID: pro-visions
          VITE_FIREBASE_STORAGE_BUCKET: pro-visions.firebasestorage.app
          VITE_FIREBASE_MESSAGING_SENDER_ID: "570621295453"
          VITE_FIREBASE_APP_ID: "1:570621295453:web:3e2c03807274d8d4e286b4"
          VITE_FIREBASE_MEASUREMENT_ID: G-C6FC4FJXWX
          VITE_FIREBASE_VAPID_KEY: ${{ secrets.VITE_FIREBASE_VAPID_KEY }}
          VITE_GEMINI_API_KEY: ${{ secrets.VITE_GEMINI_API_KEY }}
      - name: Deploy Functions with Gemini key
        run: |
          npm install -g firebase-tools
          echo '${{ secrets.FIREBASE_SERVICE_ACCOUNT_PRO_VISIONS }}' > /tmp/sa.json
          GOOGLE_APPLICATION_CREDENTIALS=/tmp/sa.json firebase functions:config:set gemini.api_key="${{ secrets.VITE_GEMINI_API_KEY }}" --project pro-visions
          GOOGLE_APPLICATION_CREDENTIALS=/tmp/sa.json firebase deploy --only functions --project pro-visions
          rm /tmp/sa.json
      - uses: FirebaseExtended/action-hosting-deploy@v0
        with:
          repoToken: ${{ secrets.GITHUB_TOKEN }}
          firebaseServiceAccount: ${{ secrets.FIREBASE_SERVICE_ACCOUNT_PRO_VISIONS }}
          channelId: live
          projectId: pro-visions
