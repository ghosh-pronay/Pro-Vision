name: Deploy to Firebase Hosting on merge
on:
  push:
    branches:
      - main
permissions:
  contents: read
jobs:
  build_and_deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - run: npm audit --audit-level=high || true
      - run: npm run lint && npm run typecheck && npm run test:coverage
      - run: npm run build
        env:
          VITE_FIREBASE_API_KEY: ${{ secrets.VITE_FIREBASE_API_KEY }}
          VITE_FIREBASE_AUTH_DOMAIN: pro-visions.firebaseapp.com
          VITE_FIREBASE_PROJECT_ID: pro-visions
          VITE_FIREBASE_STORAGE_BUCKET: pro-visions.firebasestorage.app
          VITE_FIREBASE_MESSAGING_SENDER_ID: "570621295453"
          VITE_FIREBASE_APP_ID: "1:570621295453:web:3e2c03807274d8d4e286b4"
          VITE_FIREBASE_MEASUREMENT_ID: G-C6FC4FJXWX
          VITE_FIREBASE_VAPID_KEY: ${{ secrets.VITE_FIREBASE_VAPID_KEY }}
      - name: Deploy Functions with API keys
        run: |
          npm install -g firebase-tools@13
          echo "$SERVICE_ACCOUNT" > /tmp/sa.json
          GOOGLE_APPLICATION_CREDENTIALS=/tmp/sa.json firebase functions:config:set gemini.api_key="$GEMINI_KEY" groq.api_key="$GROQ_KEY" --project pro-visions
          GOOGLE_APPLICATION_CREDENTIALS=/tmp/sa.json firebase deploy --only functions --project pro-visions
          rm /tmp/sa.json
        env:
          SERVICE_ACCOUNT: ${{ secrets.FIREBASE_SERVICE_ACCOUNT_PRO_VISIONS }}
          GEMINI_KEY: ${{ secrets.VITE_GEMINI_API_KEY }}
          GROQ_KEY: ${{ secrets.GROQ_API_KEY }}
      - uses: FirebaseExtended/action-hosting-deploy@v0
        with:
          repoToken: ${{ secrets.GITHUB_TOKEN }}
          firebaseServiceAccount: ${{ secrets.FIREBASE_SERVICE_ACCOUNT_PRO_VISIONS }}
          channelId: live
          projectId: pro-visions
