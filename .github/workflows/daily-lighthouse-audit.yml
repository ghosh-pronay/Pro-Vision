name: Daily Lighthouse Audit

on:
  schedule:
    - cron: "0 6 * * *" # 6 AM UTC daily (12 PM BST)
  workflow_dispatch:
    inputs:
      email:
        description: "Override recipient email (optional, needs RESEND_API_KEY secret)"
        required: false

permissions:
  contents: read
  issues: write

jobs:
  audit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - name: Run Lighthouse audit
        uses: treosh/lighthouse-ci-action@b65d53cb99873122d93bfb900d4b505143450c89 # v12.1.0
        id: lhci
        with:
          urls: |
            https://pro-vision.web.app/
            https://pro-vision.web.app/todo
            https://pro-vision.web.app/habits
            https://pro-vision.web.app/goals
            https://pro-vision.web.app/journal
            https://pro-vision.web.app/wellbeing
          configPath: ./lighthouserc-audit.json
          uploadArtifacts: false

      - name: Generate report
        id: report
        run: |
          DATE=$(date +%Y-%m-%d)
          RUN_URL="${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"
          RESULT_DIR=$(find . -path "*/.lighthouseci" -type d 2>/dev/null | head -1)

          if [ -z "$RESULT_DIR" ]; then
            echo "No results found" > report.md
            echo "GRADE=N/A" >> "$GITHUB_OUTPUT"
            echo "COUNT=0" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          # --- Build Markdown Report ---
          MD="# Lighthouse Audit Report\n"
          MD+="**Date:** $DATE  \n"
          MD+="**Site:** [pro-vision.web.app](https://pro-vision.web.app)  \n\n"

          TOTAL_PERF=0; TOTAL_A11Y=0; TOTAL_BP=0; TOTAL_SEO=0; COUNT=0

          score_emoji() { [ "$1" = "N/A" ] && echo "⚪" || ([ "$1" -ge 90 ] && echo "🟢" || ([ "$1" -ge 50 ] && echo "🟡" || echo "🔴")); }

          for json_file in "$RESULT_DIR"/*.json; do
            [ -f "$json_file" ] || continue
            grep -q '"categories"' "$json_file" || continue

            URL=$(python3 -c "import json; d=json.load(open('$json_file')); print(d.get('finalUrl', d.get('requestedUrl', 'unknown')))" 2>/dev/null || echo "unknown")
            PERF=$(python3 -c "import json; d=json.load(open('$json_file')); print(int(d['categories']['performance']['score']*100))" 2>/dev/null || echo "N/A")
            A11Y=$(python3 -c "import json; d=json.load(open('$json_file')); print(int(d['categories']['accessibility']['score']*100))" 2>/dev/null || echo "N/A")
            BP=$(python3 -c "import json; d=json.load(open('$json_file')); print(int(d['categories']['best-practices']['score']*100))" 2>/dev/null || echo "N/A")
            SEO=$(python3 -c "import json; d=json.load(open('$json_file')); print(int(d['categories']['seo']['score']*100))" 2>/dev/null || echo "N/A")

            # Shorten URL for display
            SHORT_URL=$(echo "$URL" | sed 's|https://pro-vision.web.app||' | sed 's|^/$|/ (home)|')
            [ -z "$SHORT_URL" ] && SHORT_URL="/ (home)"

            MD+="## Page: \`$SHORT_URL\`\n\n"
            MD+="| Category | Score |\n"
            MD+="|----------|-------|\n"
            MD+="| Performance | $(score_emoji $PERF) **$PERF** |\n"
            MD+="| Accessibility | $(score_emoji $A11Y) **$A11Y** |\n"
            MD+="| Best Practices | $(score_emoji $BP) **$BP** |\n"
            MD+="| SEO | $(score_emoji $SEO) **$SEO** |\n\n"

            if [ "$PERF" != "N/A" ]; then TOTAL_PERF=$((TOTAL_PERF + PERF)); fi
            if [ "$A11Y" != "N/A" ]; then TOTAL_A11Y=$((TOTAL_A11Y + A11Y)); fi
            if [ "$BP" != "N/A" ]; then TOTAL_BP=$((TOTAL_BP + BP)); fi
            if [ "$SEO" != "N/A" ]; then TOTAL_SEO=$((TOTAL_SEO + SEO)); fi
            COUNT=$((COUNT + 1))
          done

          if [ "$COUNT" -gt 0 ]; then
            AVG_PERF=$((TOTAL_PERF / COUNT))
            AVG_A11Y=$((TOTAL_A11Y / COUNT))
            AVG_BP=$((TOTAL_BP / COUNT))
            AVG_SEO=$((TOTAL_SEO / COUNT))
            OVERALL=$(( (AVG_PERF + AVG_A11Y + AVG_BP + AVG_SEO) / 4 ))

            if [ "$OVERALL" -ge 90 ]; then GRADE="A+"
            elif [ "$OVERALL" -ge 80 ]; then GRADE="A"
            elif [ "$OVERALL" -ge 70 ]; then GRADE="B"
            elif [ "$OVERALL" -ge 60 ]; then GRADE="C"
            else GRADE="D"; fi

            MD+="---\n\n"
            MD+="## Summary ($COUNT pages audited)\n\n"
            MD+="| Category | Average |\n"
            MD+="|----------|---------|\n"
            MD+="| Performance | $(score_emoji $AVG_PERF) **$AVG_PERF** |\n"
            MD+="| Accessibility | $(score_emoji $AVG_A11Y) **$AVG_A11Y** |\n"
            MD+="| Best Practices | $(score_emoji $AVG_BP) **$AVG_BP** |\n"
            MD+="| SEO | $(score_emoji $AVG_SEO) **$AVG_SEO** |\n\n"
            MD+="### Overall Grade: **$GRADE** ($OVERALL/100)\n"
          else
            GRADE="N/A"; OVERALL=0
          fi

          MD+="\n---\n*Auto-generated by [Lighthouse CI]($RUN_URL) | [View run]($RUN_URL)*\n"

          echo -e "$MD" > report.md
          echo "OVERALL=$OVERALL" >> "$GITHUB_OUTPUT"
          echo "GRADE=$GRADE" >> "$GITHUB_OUTPUT"
          echo "COUNT=$COUNT" >> "$GITHUB_OUTPUT"

      # --- Delivery Method 1: GitHub Issue (always works, zero setup) ---
      - name: Post audit as GitHub Issue
        uses: actions/github-script@60a0d83039c74a4aee543508d2ffcb1c3799cdea # v7.0.1
        with:
          script: |
            const fs = require('fs');
            const grade = '${{ steps.report.outputs.GRADE }}';
            const count = '${{ steps.report.outputs.COUNT }}';
            const overall = '${{ steps.report.outputs.OVERALL }}';
            const date = new Date().toISOString().split('T')[0];
            const body = fs.readFileSync('report.md', 'utf8');

            // Check for existing open issue today to avoid duplicates
            const { data: existing } = await github.rest.issues.listForRepo({
              owner: context.repo.owner,
              repo: context.repo.repo,
              state: 'open',
              labels: 'lighthouse-audit',
              per_page: 5
            });

            const todayIssue = existing.find(i => i.title.includes(date));
            if (todayIssue) {
              await github.rest.issues.update({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: todayIssue.number,
                body: body
              });
              core.info(`Updated existing issue #${todayIssue.number}`);
              return;
            }

            const emoji = grade === 'A+' ? '🏆' : grade === 'A' ? '✅' : grade === 'B' ? '⚠️' : '🔴';
            const issue = await github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: `${emoji} Audit Report: Grade ${grade} (${overall}/100) — ${date}`,
              body: body,
              labels: ['lighthouse-audit']
            });
            core.info(`Created issue #${issue.data.number}`);

      # --- Delivery Method 2: GitHub Actions Job Summary (visible in Actions tab) ---
      - name: Post job summary
        if: always()
        run: cat report.md >> "$GITHUB_STEP_SUMMARY"

      # --- Delivery Method 3: Email (optional — only if RESEND_API_KEY secret exists) ---
      - name: Send email (optional)
        if: ${{ steps.report.outputs.GRADE != 'N/A' && (secrets.RESEND_API_KEY != '' || inputs.email != '') }}
        run: |
          TO_EMAIL="${{ inputs.email }}"
          if [ -z "$TO_EMAIL" ]; then
            TO_EMAIL="${{ secrets.AUDIT_EMAIL }}"
          fi
          if [ -z "$TO_EMAIL" ]; then
            echo "No email configured, skipping email delivery"
            exit 0
          fi

          RESEND_KEY="${{ secrets.RESEND_API_KEY }}"
          if [ -z "$RESEND_KEY" ]; then
            echo "No RESEND_API_KEY secret, skipping email delivery"
            exit 0
          fi

          GRADE="${{ steps.report.outputs.GRADE }}"
          COUNT="${{ steps.report.outputs.COUNT }}"
          DATE=$(date +%Y-%m-%d)

          # Convert markdown to simple HTML for email
          EMAIL_HTML=$(cat report.md | python3 -c "
          import sys, json, re
          md = sys.stdin.read()
          html = md
          html = re.sub(r'^### (.+)$', r'<h3>\1</h3>', html, flags=re.MULTILINE)
          html = re.sub(r'^## (.+)$', r'<h2>\1</h2>', html, flags=re.MULTILINE)
          html = re.sub(r'^# (.+)$', r'<h1>\1</h1>', html, flags=re.MULTILINE)
          html = re.sub(r'\*\*(.+?)\*\*', r'<strong>\1</strong>', html)
          html = re.sub(r'\*(.+?)\*', r'<em>\1</em>', html)
          html = re.sub(r'\[(.+?)\]\((.+?)\)', r'<a href=\"\2\">\1</a>', html)
          html = re.sub(r'\|(.+)\|', lambda m: '<tr>' + ''.join(f'<td style=\"padding:8px;border:1px solid #333\">{c.strip()}</td>' for c in m.group(1).split('|')) + '</tr>', html)
          html = re.sub(r'<tr>(.+)</tr>', lambda m: m.group(0) if '</td>' in m.group(0) else '', html, flags=re.MULTILINE)
          html = html.replace('\n', '<br>')
          html = f'<div style=\"font-family:sans-serif;max-width:600px;margin:0 auto;color:#e4e4e7;background:#0a0a0a;padding:20px\">{html}</div>'
          print(json.dumps(html))

          curl -s --request POST \
            --url https://api.resend.com/emails \
            --header "Authorization: Bearer $RESEND_KEY" \
            --header "Content-Type: application/json" \
            --data "{
              \"from\": \"Pro-Vision Bot <onboarding@resend.dev>\",
              \"to\": [\"$TO_EMAIL\"],
              \"subject\": \"Audit: Grade $GRADE ($COUNT pages) — $DATE\",
              \"html\": $EMAIL_HTML
            }"
          echo "Email sent to $TO_EMAIL"

      - name: Upload report artifact
        if: always()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: lighthouse-report-${{ github.run_id }}
          path: report.md
          retention-days: 30
