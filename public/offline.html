<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Pro-Vision - Offline</title>
    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }
      body {
        font-family:
          system-ui,
          -apple-system,
          sans-serif;
        background: #121820;
        color: #e2e8f0;
        display: flex;
        align-items: center;
        justify-content: center;
        min-height: 100vh;
        text-align: center;
        padding: 20px;
      }
      .container {
        max-width: 400px;
      }
      .icon {
        font-size: 64px;
        margin-bottom: 16px;
      }
      h1 {
        font-size: 24px;
        margin-bottom: 8px;
      }
      p {
        color: #94a3b8;
        margin-bottom: 24px;
        line-height: 1.5;
      }
      button {
        background: #1a6fb5;
        color: white;
        border: none;
        padding: 12px 32px;
        border-radius: 12px;
        font-size: 16px;
        cursor: pointer;
      }
      button:hover {
        background: #155a8f;
      }
    </style>
  </head>
  <body>
    <div class="container">
      <div class="icon">📡</div>
      <h1>You're Offline</h1>
      <p>Check your internet connection and try again.</p>
      <button onclick="window.location.reload()">Retry</button>
    </div>
  </body>
</html>
